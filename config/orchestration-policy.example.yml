schema_version: '2.0'
policy_document: docs/44-model-sequencing-and-cost-governance.md
primary_roadmap: docs/84-chatgpt-openknowledge-first-plan.md

profiles:
  chatgpt-default:
    actor_product: chatgpt
    provider_mode: product-managed
    model: user-or-product-selected
    role:
      - planner
      - analyst
      - vision
      - reviewer
    status: active
    automatic_fallback: false
    work_capture: enabled

  codex-repository-work:
    actor_product: codex
    provider_mode: product-managed
    model: user-or-product-selected
    role: repository-executor
    status: candidate
    automatic_fallback: false
    require_git_diff: true
    require_verification: true
    work_capture: enabled

  claude-code-repository-work:
    actor_product: claude-code
    provider_mode: product-managed
    model: user-selected
    role: repository-executor
    status: candidate
    automatic_fallback: false
    require_git_diff: true
    require_verification: true
    work_capture: enabled

  opencode-repository-work:
    actor_product: opencode
    provider_mode: explicit-provider
    model: null
    role: repository-executor
    status: candidate
    automatic_fallback: false
    require_git_diff: true
    require_verification: true
    work_capture: enabled

  sonnet-review:
    actor_product: anthropic-api-or-claude
    model: claude-sonnet-4-6
    role:
      - complex-planner
      - vision-reviewer
      - final-reviewer
    status: optional
    automatic_fallback: false
    user_selection_required: true

  opus-escalation:
    actor_product: anthropic-api-or-claude
    model: claude-opus-4-8
    role: exceptional-reviewer
    status: optional
    automatic_fallback: false
    user_approval_required: true

  local-private-execute:
    provider: windows-local
    model_alias: coding-local-fast-primary
    role: local-executor
    status: deferred
    local_need_gate_required: true
    context_length: 8192
    thinking: false
    automatic_fallback: false
    work_capture: enabled

  budget-cloud-execute:
    provider: cloud-payg
    model: null
    role: budget-executor
    status: deferred
    benchmark_required: true
    automatic_fallback: false
    work_capture: enabled

routing:
  automatic_routing: false
  automatic_paid_fallback: false
  automatic_sonnet_to_opus: false
  automatic_local_to_cloud: false
  automatic_cloud_to_local: false
  default_interface: chatgpt-default
  repository_actor: user-selected
  local_executor_available: false
  local_executor_enable_condition: local-need-approved

execution_contract:
  required_fields:
    - task_id
    - data_class
    - goal
    - constraints
    - target_files
    - acceptance_tests
    - prohibited_actions
    - actor_product
    - selected_model_or_mode
    - external_transfer
    - budget_or_usage_limit
    - wiki_sources

work_capture:
  schema: config/work-capture-schema.example.yml
  review_before_write: true
  destination: openknowledge

logging:
  record_actor_product: true
  record_selected_model_or_mode: true
  record_external_transfer: true
  record_usage_or_cost: true
  record_retries: true
  record_human_interventions: true
  record_test_status: true
  record_total_duration: true
  record_wiki_reuse: true

local_need_review:
  measurement_window_days: 14
  minimum_tasks: 30
  gate_document: docs/84-chatgpt-openknowledge-first-plan.md
