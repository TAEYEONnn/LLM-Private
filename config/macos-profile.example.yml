profile: macos
workspace_root: '~/AI-Workspace'
local_override_file: config/local/macos.local.yml

windows:
  host_from_env: WINDOWS_PRIVATE_IP
  host_default: null
  discovery_required: true
  endpoint_from_env: WINDOWS_LLM_ENDPOINT
  ollama_port: 11434
  open_webui_port: 3000
  comfyui_port: 8188

security:
  default_data_class: PRIVATE
  auto_fallback: false
  auto_payment: false

local_fallback:
  max_model_class: 9B
  context_length: 8192
