schema_version: '2.0'
plan_document: docs/82-openknowledge-integration-plan.md
primary_roadmap: docs/84-chatgpt-openknowledge-first-plan.md

openknowledge:
  status: candidate-review
  role: knowledge-source-of-truth
  install_phase: phase-1-wiki-first
  platform: macos-apple-silicon

  source:
    official_repository: https://github.com/inkeep/open-knowledge
    official_docs: https://openknowledge.ai/docs
    release_or_commit: null
    artifact_sha256: null
    auto_update: false

  pilot:
    project_path: '~/AI-Workspace/openknowledge-pilot'
    data_class: PUBLIC
    separate_repository: true
    use_existing_code_repository: false
    use_llm_private_repository: false
    local_llm_required: false

  runtime:
    preferred_distribution: macos-desktop
    cli_install: false

  integrations:
    chatgpt:
      status: candidate
      initial_scope: read-search
      verify_support_on_execution_day: true
      fallback_mode: project-or-manual-import
      write_access: false
    codex:
      status: candidate
      initial_scope: work-capture
    claude_code:
      status: candidate
      initial_scope: work-capture
    opencode:
      status: candidate
      local_provider_required: false
    cursor:
      status: disabled

  permissions:
    full_access: false
    auto_mode: false
    initial_scope: read-search
    project_root_only: true
    approved_document_overwrite: false
    delete_requires_approval: true
    move_requires_approval: true
    git_commit_requires_approval: true
    git_push_allowed: false

  project_config:
    content:
      dir: '.'
    telemetry:
      localSink:
        enabled: false

  project_local_config:
    autoSync:
      enabled: false
    search:
      semantic:
        enabled: false

  network:
    github_sync: false
    semantic_provider: null
    support_bundle_upload: false
    remote_connection_requires_approval: true
    document_egress_must_be_logged: true

  work_capture:
    schema: config/work-capture-schema.example.yml
    status: candidate
    review_before_write: true
    save_full_chat_log: false
    save_raw_terminal_log: false

  benchmark:
    tasks:
      - list-and-read
      - lexical-search
      - create-draft-document
      - partial-edit-draft
      - timeline-recovery
      - chatgpt-read-search
      - work-capture-event

  approval:
    state: candidate-review
    minimum_read_search_success_rate: 0.95
    minimum_write_edit_success_rate: 0.90
    minimum_timeline_recovery_rate: 1.00
    require_zero_path_escape: true
    require_zero_automatic_push: true
    require_zero_secret_capture: true
    require_rollback_verification: true

  local_need_review:
    deferred: true
    measurement_window_days: 14
    minimum_tasks: 30
    gate_document: docs/84-chatgpt-openknowledge-first-plan.md

  handoff_file: config/local/openknowledge-handoff.local.yml
